<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Imóveis</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script type="module" src="js/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cadastro de Imóveis</h1>
            <p>Informe os dados do imóvel para o cadastro.</p>
        </header>

        <div class="card">
            <form id="form-imovel">
                <div class="form-grid">
                    <div class="campo">
                        <label for="descricao">Descrição:</label>
                        <input type="text" id="descricao" name="descricao" required>
                    </div>
                    <div class="campo">
                        <label for="comprimento">Comprimento (em metros):</label>
                        <input type="number" id="comprimento" name="comprimento" min="0" step="0.01" required>
                    </div>
                    <div class="campo">
                        <label for="largura">Largura (em metros):</label>
                        <input type="number" id="largura" name="largura" min="0" step="0.01" required>
                    </div>

                </div>

                <div style="margin-top: 20px; text-align: right;">
                    <button type="submit">Adicionar Imóvel</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="lista-header">
                <h2>Imóveis Cadastrados</h2>
                <button type="button" id="btn-limpar-lista">Limpar lista</button>
            </div>
            <div id="div-lista-imoveis" class="imovel-lista">
                
            </div>
        </div>

    </div>


</body>

</html>
